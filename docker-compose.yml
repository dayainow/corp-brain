services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: corpbrain-pg
    environment:
      POSTGRES_USER: corpbrain
      POSTGRES_PASSWORD: corpbrain
      POSTGRES_DB: corpbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/lib/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: corpbrain-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: corpbrain-app
    ports:
      - "3000:3000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_URL: http://localhost:3000
      VAULT_PATH: ./vault
      EMBEDDING_MODEL: Xenova/multilingual-e5-small
      VECTOR_STORE: pgvector
      DATABASE_URL: postgresql://corpbrain:corpbrain@postgres:5432/corpbrain
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
      OLLAMA_MODEL: llama3
    volumes:
      - ./data:/app/data
      - ./vault:/app/vault
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
