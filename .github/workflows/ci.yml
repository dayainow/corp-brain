name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Vault 인덱싱 (검색 품질 게이트 선행)
        run: npm run index:vault
        env:
          AUTH_SECRET: ci-test-secret-at-least-32-chars-long

      - run: npm run lint

      - run: npm test
        env:
          EVAL_HIT3_THRESHOLD: "0.8"

      - name: Quality Harness (Hit@3 포함)
        run: npm run harness:quality
        env:
          EVAL_HIT3_THRESHOLD: "0.8"

      - run: npm run build
        env:
          AUTH_SECRET: ci-test-secret-at-least-32-chars-long
          AUTH_URL: http://localhost:3000

      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        env:
          CI: true
          AUTH_SECRET: e2e-test-secret-at-least-32-chars-long
          AUTH_URL: http://localhost:3000
          PLAYWRIGHT_BASE_URL: http://localhost:3001

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
