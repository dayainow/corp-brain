name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
        env:
          AUTH_SECRET: ci-test-secret-at-least-32-chars-long
          AUTH_URL: http://localhost:3000

      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        env:
          CI: true
          AUTH_SECRET: e2e-test-secret-at-least-32-chars-long
          AUTH_URL: http://localhost:3000
