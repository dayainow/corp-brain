name: Quality Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run harness:quality

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm run index:vault
        env:
          AUTH_SECRET: ci-test-secret-at-least-32-chars-long

      - run: npm run eval:search
        env:
          EVAL_HIT3_THRESHOLD: "0.5"
