name: Compose Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "Dockerfile"
      - "scripts/deploy-compose.sh"
      - "scripts/pilot-compose-smoke.sh"
      - "src/lib/db/**"
      - "src/lib/vector-store/**"

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AUTH_SECRET: ci-compose-smoke-secret-32chars-min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Compose 인프라 기동 (postgres + redis)
        run: docker compose up -d postgres redis

      - name: PostgreSQL 준비 대기
        run: |
          until docker compose exec -T postgres pg_isready -U corpbrain >/dev/null 2>&1; do
            sleep 2
          done

      - name: PgVector 스키마 초기화
        run: npm run db:init
        env:
          DATABASE_URL: postgresql://corpbrain:corpbrain@localhost:5433/corpbrain

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: PgVector 인덱싱 + Hit@3 eval
        run: |
          set -a
          source config/env/compose.host.env
          set +a
          npm run index:vault
          EVAL_HIT3_THRESHOLD=0.8 npm run eval:search

      - name: Docker Compose 앱 빌드·기동
        run: docker compose up -d --build app

      - name: Health 검증 (pgvector · redis · postgres)
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
              break
            fi
            sleep 3
          done
          curl -fsS http://localhost:3000/api/health | node -e "
            const h = JSON.parse(require('fs').readFileSync(0,'utf8'));
            const c = h.checks || {};
            const fail = [];
            if (h.vectorStore !== 'pgvector') fail.push('vectorStore');
            if (c.postgres !== 'ok') fail.push('postgres');
            if (c.redis !== 'ok') fail.push('redis');
            if (!(h.chunkCount > 0)) fail.push('chunkCount');
            if (fail.length) {
              console.error('FAIL:', fail.join(', '));
              console.log(JSON.stringify(h, null, 2));
              process.exit(1);
            }
            console.log('health ok, chunks:', h.chunkCount, 'status:', h.status);
          "

      - name: Compose 로그 (실패 시)
        if: failure()
        run: docker compose logs --no-color app postgres redis | tail -200
